<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root {
        --brand-red: #e50914;
        --bg-dark: #141414;
        --control-bg: #252a34;
        --icon-color: #8a96a3;
        --highlight-blue: #ff4d4d;
    }

    body {
        background-color: #1a1a1a;
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        color: white;
    }

    /* --- Navbar Styling --- */
    .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 5%;
        
    }

    .browse-btn {
        display: flex;
        align-items: center;
        background-color: var(--brand-red);
        color: white;
        text-decoration: none;
        padding: 8px 20px;
        border-radius: 50px;
        font-weight: 600;
        font-size: 14px;
        gap: 8px;
    }

    .nav-logo {
        height: 40px;
        width: auto;
    }

    .nav-right {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .icon-btn {
        background: none;
        border: none;
        color: white;
        font-size: 1.2rem;
        cursor: pointer;
    }

    .profile-icon {
        width: 35px;
        height: 35px;
        background: linear-gradient(to bottom, #ff4d4d, #b30000);
        border-radius: 6px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* --- Video Player Styling --- */
    .video-card {
        width: 90%;
        max-width: 800px; /* Standard Desktop Size */
        margin: 40px auto;
        background-color: var(--control-bg);
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    }

    .video-container {
        position: relative;
        width: 100%;
        /* Standard Movie Aspect Ratio (16:9) */
        aspect-ratio: 16 / 9; 
        background-color: black;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    video {
        width: 100%;
        height: 100%;
        object-fit: cover; /* Ensures video fills the fixed area without gaps */
    }

    .play-overlay {
        position: absolute;
        z-index: 2;
        cursor: pointer;
    }

    .play-circle {
        width: 70px;
        height: 70px;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .play-circle i {
        color: white;
        font-size: 1.8rem;
        padding-left: 5px;
    }

    /* --- Control Bar --- */
    .controls-bar {
        display: flex;
        justify-content: space-between;
        padding: 20px 30px;
    }

    .left-controls, .right-controls {
        display: flex;
        gap: 25px;
    }

    .controls-bar i {
        color: var(--icon-color);
        font-size: 1.3rem;
        cursor: pointer;
    }

    .controls-bar i.highlight {
        color: var(--highlight-blue);
    }

    /* Responsive Adjustments */
    @media (max-width: 600px) {
        .controls-bar { padding: 15px; gap: 15px; }
        .play-circle { width: 50px; height: 50px; }
        .browse-btn span { display: none; } /* Hide text on mobile */
    }
   #title{
       position: relative;
       margin-left: 30px;
       margin-top: 20px;
   }
    #player{
       width: 100%;
       height: 100%;
       border: none;
   }
   i:hover{
       color: #ff4d4d;
   }
   .server-section {
    text-align: center;
    margin: 30px auto;
    color: #e0e0e0;
    max-width: 500px;
}

.server-hint {
    font-size: 14px;
    margin-bottom: 20px;
    font-weight: 300;
    opacity: 0.9;
}

/* Container for the buttons */
.server-switcher {
    display: inline-flex;
    background-color: #555; /* Dark grey side */
    border-radius: 50px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.server-btn {
    border: none;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 30px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    background-color: transparent;
    color: white;
}

/* Active State (White Side) */
.server-btn.active {
    background-color: white;
    color: #333;
}

/* Blue Cloud Icon for active state */
.server-btn.active i {
    color: #ff4d4d;
}

/* Inactive Cloud Icon */
.server-btn i {
    font-size: 1.1rem;
}

.server-btn:hover:not(.active) {
    background-color: #666;
}
  </style>
</head>

<body>

<nav class="navbar">
    <div class="nav-left">
        <a href="#" class="browse-btn">
            <i class="fa-solid fa-play"></i>
           <b> Browse</b>
        </a>
    </div>

    <div class="nav-center">
        <img src="/IMG/logo_m.png" alt="Logo" class="nav-logo">
    </div>

    <div class="nav-right">
        <button class="icon-btn">
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>
        <div class="profile-icon">
            <i class="fa-solid fa-face-smile"></i>
        </div>
    </div>
</nav>
  <h3 id="title">Title||movie</h3>
<div class="video-card">
      
    <div class="video-container">
      
        <iframe id="player" poster="your-thumbnail.jpg" src="https://rrr.prime37node.site/pz78/c5/h6a90f70b8d237f94866b6cfc2c7e06afdb8423c6639e9e32ba74387520ba61a4ef40899eb0ee7bdfc502a43593daa34230432706379458e1478bc99c18fc5cfe4c1a/4/aGxzLzEwODAvMTA4MA,Ktm0Vt9-cJyXbGG_O3gV_5vGK-kpiQ.m3u8">
            
        </iframe>
        
        <div class="play-overlay" onclick="togglePlay()">
            <div class="play-circle">
                <i class="fa-solid fa-play" id="playIcon"></i>
            </div>
        </div>
    </div>

    <div class="controls-bar">
        <div class="left-controls">
            <i class="fa-solid fa-moon"></i>
            <i class="fa-solid fa-circle-play"></i>
            <i class="fa-solid fa-forward-step highlight"></i>
        </div>
        <div class="right-controls">
            <i class="fa-solid fa-bookmark"></i>
            <i class="fa-solid fa-triangle-exclamation"></i>
        </div>
    </div>
</div>
<div class="right-controls">
    <i class="fa-solid fa-expand highlight" onclick="toggleSize()" id="sizeBtn" title="Toggle Fullscreen"></i>
    <i class="fa-solid fa-bookmark"></i>
    <i class="fa-solid fa-triangle-exclamation"></i>
</div>

<script>
    const iframe = document.getElementById("player");
    const sizeBtn = document.getElementById("sizeBtn");

    // 1. Set initial responsive style (Small/Fit)
    // We override your fixed CSS inline to make it fit the container first
    iframe.style.position = "absolute";
    iframe.style.width = "100%";
    iframe.style.height = "100%";
    iframe.style.top = "0";
    iframe.style.left = "0";

    function toggleSize() {
        if (iframe.style.position === "absolute") {
            // Make it Full Page
            iframe.style.position = "fixed";
            iframe.style.zIndex = "9999";
            sizeBtn.classList.replace('fa-expand', 'fa-compress');
        } else {
            // Make it Fit Small (Card)
            iframe.style.position = "absolute";
            iframe.style.zIndex = "1";
            sizeBtn.classList.replace('fa-compress', 'fa-expand');
        }
    }

    // Handle internal video sizing if same-origin
    iframe.onload = () => {
        try {
            const innerDoc = iframe.contentDocument || iframe.contentWindow.document;
            const v = innerDoc.querySelector("video");
            if (v) {
                v.style.width = "100%";
                v.style.height = "100%";
                v.style.objectFit = "cover";
            }
        } catch (e) {
            console.log("Cross-origin iframe: Cannot style internal video directly.");
        }
    };
</script>
  <script type="module">
    import { fetchmovie } from "/JS/fetchMovie.js";
    fetchmovie.fetchWorker();
    
</script>

</body>
</html>
